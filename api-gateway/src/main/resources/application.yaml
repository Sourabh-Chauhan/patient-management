spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
          - id: auth-service-route
            uri: ${auth-service-route}
            predicates:
              - Path=/auth/**
            filters:
              - StripPrefix=1

            # Route for /api/patients to patient-service /api/patients
          - id: patient-service-route
            uri: ${patient-service-route}
            predicates:
              - Path=/api/patients/**
            filters:
              - StripPrefix=1
              - JwtValidation

            # Route for /api/docs/patients to patient-service /v3/api-docs   
          - id: api-docs-patient-route
            uri: ${patient-service-route}
            predicates:
              - Path=/api-docs/patients
            filters:
              - RewritePath=/api-docs/patients,/v3/api-docs	

server:
  port: 4004 # Gateway listens on port 4004
